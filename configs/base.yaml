# Frozen global configuration for the event-centered blind-spot risk project.
# Owned by SOP-00. Any change to coordinates, tensor dimensions, risk formula
# constants, or G* cost semantics is a schema change and must be recorded in
# DECISIONS.md before other workflows adopt it.

seed: 42
schema_version: "3.0.0"

bev:
  range_m: 16.0          # full BEV width and height in meters ([-8, 8] each axis)
  resolution_m: 0.1
  size: 160              # H == W == 160 cells
  history_steps: 8       # K, at history_dt_s spacing (1.6 s window)
  history_dt_s: 0.2
  future_steps: 15       # q1...q15 endpoints at 0.2...3.0 s; q0 is not serialized
  future_dt_s: 0.2

robot:
  model: differential_drive
  length_m: 0.70
  width_m: 0.55
  inflation_m: 0.15
  max_linear_speed_mps: 0.9
  max_angular_speed_radps: 0.8

dynamic_objects:
  human:
    radius_m: 0.30
    carrier_radius_m: 0.45
    min_speed_mps: 0.30
    max_speed_mps: 2.00
    max_acceleration_mps2: 2.50
  carried_object:
    fallback_length_m: 0.80
    fallback_width_m: 0.20
    min_speed_mps: 0.05
    max_speed_mps: 2.00
    max_acceleration_mps2: 2.50
  unknown_dynamic:
    fallback_radius_m: 0.50
    min_speed_mps: 0.05
    max_speed_mps: 2.00
    max_acceleration_mps2: 2.50
  marker_geometry:
    extent_quantile: 0.95
    minimum_valid_frames: 20
    min_extent_m: 0.05
    max_extent_m: 3.00

age_map:
  a_max_s: 5.0
  never_seen_value: 1.0
  visible_value: 0.0

trajectories:
  linear_velocities: [0.2, 0.4, 0.6, 0.8]
  angular_velocities: [-0.8, -0.4, 0.0, 0.4, 0.8]
  reverse_velocities: [-0.2, -0.4]
  reverse_probability: 0.2
  horizon_s: 3.0
  dt_s: 0.2

risk_gt:
  sigma_distance_m: 0.5
  sigma_time_s: 2.0
  near_miss_distance_m: 0.35

scenario_bank:
  size: 16
  posterior_temperature: 0.2
  reject_cost: 0.20

verification:
  useful_margin: 0.0
  decision_margin: 0.01

verification_cost:
  lambda_time: 0.04
  lambda_distance: 0.05
  lambda_yaw_per_deg: 0.0015
