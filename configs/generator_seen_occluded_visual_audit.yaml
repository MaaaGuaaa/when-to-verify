schema_version: "3.0.0"
production_event_kind: environment

target_type_policy:
  whitelist: [human]
  weights:
    human: 1.0
    carried_object: 0.0
    unknown_dynamic: 0.0

target_history_visibility:
  policy_version: target_history_visibility_policy_v1
  min_trailing_hidden_frames: 2
  weights:
    seen_then_occluded: 1.0
    unseen_in_history_window: 0.0

conflict_time_range_s: [1.0, 2.2]
max_local_curvature_per_m: 1.0
crossing_angle_max_deg: 35.0
time_scale_range: [1.0, 1.0]
min_contiguous_visible_frames: 2

occluders:
  types: [wall, shelf, pillar]
  wall:
    length_range_m: [1.0, 3.0]
    width_range_m: [0.2, 0.5]
  shelf:
    length_range_m: [1.0, 2.5]
    width_range_m: [0.4, 0.8]
  pillar:
    length_range_m: [0.4, 0.8]
    width_range_m: [0.4, 0.8]

blind_reachability:
  algorithm_version: blind_reachability_quota_first_v3
  obstacle_proposals_per_trajectory: 8
  snippet_candidates_per_proposal: 8
  interaction_range_m: [1.0, 4.0]
  bearing_bin_count: 12
  yaw_step_deg: 30.0
  crossing_angle_step_deg: 5.0
  minimum_shadow_center_cells: 32
  chord_deviation_fastpath_m: 0.15
  unresolved_exact_fallback_per_anchor: 16
